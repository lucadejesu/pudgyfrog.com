<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paintings | Pudgy Frog</title>
    <meta name="description" content="Paintings by Pudgy Frog.">
    <link rel="stylesheet" href="styles.css?v=mobile-masthead-scenes">
  </head>
  <body>
    <div class="stars" aria-hidden="true"></div>
    <div class="moon" aria-hidden="true"></div>
    <div class="site-shell">
      <header class="masthead">
        <a class="brand" href="index.html">pudgyfrog</a>
        <p class="tagline">pixel art animations and other creative projects</p>
      </header>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Animations</a>
        <a href="thoughts.html" aria-current="page">Paintings</a>
        <a href="videos.html">Videos</a>
        <a href="links.html">Links</a>
        <label class="theme-toggle">
          <input type="checkbox" data-theme-toggle>
          <span class="theme-toggle-track" aria-hidden="true">
            <span class="theme-toggle-thumb"></span>
          </span>
          <span data-theme-label>dark mode</span>
        </label>
      </nav>
      <main class="box page-panel">
        <h1>Paintings</h1>
        <p class="page-subheading">Hover over a painting to enlarge</p>
        <figure class="painting-stage" data-painting-stage-frame tabindex="0" hidden>
          <img
            data-painting-stage
            src="assets/images/paintings/sunset-landscape.jpeg"
            alt="Painting preview"
          >
        </figure>
        <div class="painting-grid">
          <article>
            <img class="hover-painting" src="assets/images/paintings/sunset-landscape.jpeg" alt="Colorful sunset landscape painting">
          </article>
          <article>
            <img class="hover-painting" src="assets/images/paintings/moon-cabin.jpeg" alt="Blue moonlit cabin painting">
          </article>
          <article>
            <img class="hover-painting" src="assets/images/paintings/purple-harbor.jpeg" alt="Purple harbor night painting">
          </article>
          <article aria-label="Painting placeholder"></article>
          <article aria-label="Painting placeholder"></article>
          <article aria-label="Painting placeholder"></article>
        </div>
        <section class="comments-section" aria-labelledby="comments-title">
          <h2 id="comments-title">comments</h2>
          <form class="comment-form" data-comment-form>
            <label>
              name
              <input type="text" name="name" placeholder="name" autocomplete="name" required>
            </label>
            <label>
              comment
              <textarea name="comment" placeholder="comment" required></textarea>
            </label>
            <button type="submit">post</button>
          </form>
          <div class="comment-list" data-comment-list aria-live="polite"></div>
        </section>
      </main>
      <footer class="site-footer"><p>follow @pudgyfr0g on instagram</p></footer>
    </div>
    <script src="script.js?v=painting-takeover"></script>
  </body>
</html>
