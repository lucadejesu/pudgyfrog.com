<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animations | Pudgy Frog</title>
    <meta name="description" content="Animations gallery for Pudgy Frog.">
    <link rel="stylesheet" href="styles.css?v=matched-dark-panels">
  </head>
  <body>
    <div class="stars" aria-hidden="true"></div>
    <div class="moon" aria-hidden="true"></div>
    <div class="site-shell">
      <header class="masthead">
        <a class="brand" href="index.html">pudgyfrog</a>
        <p class="tagline">pixel art animations and other creative projects</p>
      </header>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html" aria-current="page">Animations</a>
        <a href="thoughts.html">Paintings</a>
        <a href="videos.html">Videos</a>
        <a href="links.html">Links</a>
        <label class="theme-toggle">
          <input type="checkbox" data-theme-toggle>
          <span class="theme-toggle-track" aria-hidden="true">
            <span class="theme-toggle-thumb"></span>
          </span>
          <span data-theme-label>dark mode</span>
        </label>
      </nav>
      <main class="box page-panel">
        <h1>Animations</h1>
        <p class="page-subheading">Hover mouse over an animation to play.</p>
        <figure class="animation-stage" data-animation-stage-frame tabindex="0" hidden>
          <img
            data-animation-stage
            src="assets/images/animations/stills/move-forward.png"
            alt="Pixel frog animation preview"
          >
        </figure>
        <div class="gallery-grid animation-grid">
          <article>
            <img class="hover-gif" src="assets/images/animations/stills/move-forward.png" data-still-src="assets/images/animations/stills/move-forward.png" data-gif-src="assets/images/animations/move-forward.gif" alt="Pixel frog animation with the words you can move forward even if you're afraid">
          </article>
          <article>
            <img class="hover-gif" src="assets/images/animations/stills/long-road.png" data-still-src="assets/images/animations/stills/long-road.png" data-gif-src="assets/images/animations/long-road.gif" alt="Pixel frog animation with the words long road ahead, or a beautiful view">
          </article>
          <article>
            <img class="hover-gif" src="assets/images/animations/stills/dark-feeling.png" data-still-src="assets/images/animations/stills/dark-feeling.png" data-gif-src="assets/images/animations/dark-feeling.gif" alt="Pixel frog animation with the words when things are feeling dark">
          </article>
          <article>
            <img class="hover-gif" src="assets/images/animations/stills/slow-down.png" data-still-src="assets/images/animations/stills/slow-down.png" data-gif-src="assets/images/animations/slow-down.gif" alt="Pixel frog animation with the words it's important to slow down and take in the moment">
          </article>
          <article>
            <img class="hover-gif" src="assets/images/animations/stills/light-places.png" data-still-src="assets/images/animations/stills/light-places.png" data-gif-src="assets/images/animations/light-places.gif" alt="Pixel frog animation with the words light can be found in many different places">
          </article>
          <article>
            <img class="hover-gif" src="assets/images/animations/stills/train-thoughts.png" data-still-src="assets/images/animations/stills/train-thoughts.png" data-gif-src="assets/images/animations/train-thoughts.gif" data-stage-fit="contain" alt="Pixel frog animation with the words you have the ability to view your thoughts as trains passing by at the station">
          </article>
        </div>
      </main>
      <footer class="site-footer"><p>follow @pudgyfr0g on instagram</p></footer>
    </div>
    <script src="script.js?v=animation-takeover-fit"></script>
  </body>
</html>
